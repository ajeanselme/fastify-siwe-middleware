name: Publish Docker Image

on:
  release:
    types:
      - published
  workflow_run:
    workflows:
      - Release If Needed
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Decide publish eligibility and version tag
        id: release_state
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ "$EVENT_NAME" == "release" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "version_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"

          git fetch --tags --force

          if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "version_tag=${TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG_COMMIT="$(git rev-list -n1 "${TAG}")"
          HEAD_COMMIT="$(git rev-parse HEAD)"

          if [[ "$TAG_COMMIT" == "$HEAD_COMMIT" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.release_state.outputs.should_publish == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.release_state.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.release_state.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.release_state.outputs.should_publish == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.release_state.outputs.version_tag }}
            type=sha

      - name: Build and push image
        if: steps.release_state.outputs.should_publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
